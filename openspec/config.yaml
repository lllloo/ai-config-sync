schema: spec-driven

context: |
  **專案**：Claude Code / Codex 跨裝置設定同步工具（CLI）。透過私有 Git repo 讓多台裝置的 AI 工具全域設定保持一致。

  **技術棧與硬限制**：
  - Node.js >= 18，**零外部相依**——所有功能只用內建模組，禁止 `npm install` 任何套件（含 dev 相依）。
  - 測試用 `node:test`（`npm test` 跑 `test/*.test.js`），共用 helper 在 `test/helpers.js`。
  - 跨平台：Windows 11 為主力、macOS 次要。路徑與 symlink 行為須兩邊都成立（Windows symlink 需開發者模式，有 junction fallback）。
  - 無 CI、無 lint/formatter——品質靠測試與 drift-guard 自律把關。

  **架構**：`sync.js` 為主 CLI 入口；`safety-check.js`、`toml-reader.js`、`skills.js` 為功能模組。
  功能模組**不得反向 require `sync.js`**，共用工具以 `createXxx(deps)` DI 注入（`toml-reader.js` 為純函式零 IO，可被直接 require）。

  **關鍵不變式**（提案時務必確認不違反）：
  - **所有函式 ≤ 60 行**。唯一例外是 DI factory（`createSafetyChecker`／`createSkillsHandler`）這類閉包容器，其內部各閉包仍須 ≤ 60 行。
  - **永不寫入或讀取 `~/.claude.json` 與 `~/.codex/config.toml`**。MCP 同步已整批移除待重新設計；不要新增 `codex/config.toml`，不要讓 `type: 'mcp'`／`type: 'advisory'` 復活（有回歸鎖）。
  - **Atomic write**：所有寫入走 `writeFileSafe`（暫存檔 + rename），提供原子性但不保證持久性。
  - **統一錯誤處理**：一律拋 `SyncError`（`code` + `context`），禁止裸 `console.error + process.exit`。
  - **Exit code**：0 成功／diff 無差異、1 diff 有差異、2 錯誤。
  - **不洩漏敏感資訊**：`diff`／`status` 不印設定內容，`safety:check` 不印 secret 原值或完整 HOME 路徑（路徑一律經 `toRelativePath` 遮罩）。
  - **安全判準 fail closed**：無法判定為安全即拒絕，不得加繞過旗標或例外清單。

  **同步守則**：
  - 宣告式同步項目集中在 `SYNC_MANIFEST`（一列 = 一路徑），型別行為由 `diffSyncItem`／`applySyncItem` 依 `SyncItem.type` 分派（`file`／`settings`／`dir`／`xtool-skills`）。
  - 新增指令須同步改三處：`COMMANDS` 物件、`runCommand` 的 `switch`、README 指令別名表（三者皆有 drift-guard 測試把關）。
  - `settings.json` top-level 採**黑名單制**（`DEVICE_SETTINGS_KEYS`），預設同步、僅排除裝置偏好與平台綁定項。
  - 全域 skill 唯一落點為 `agents/skills/`（跨工具）；`claude/` 放 Claude 設定、`codex/` 放 Codex 設定。`.claude/`／`.agents/`（有點）是本 repo 本地設定，不參與同步。

  **文件同步義務**：新增／移除指令、改變同步項目、調整行為、新增旗標時，**README.md 必跟**。部分項目有 drift-guard 測試（漏改會 fail），其餘靠人工。

  **慣例**：所有文件、註解、commit 訊息一律**繁體中文**（技術術語保留英文）。
